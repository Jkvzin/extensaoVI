<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Matemática - Quem é você?</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/audio.js"></script>
    <script src="js/acessibilidade.js"></script>
    <script src="js/tour.js"></script>
    <script src="js/tour-config.js"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <h1>Bem-vindo! 🚀</h1>

        <!-- Step 0: Tipo de Usuário -->
        <div id="step-tipo" class="step-container">
            <h2>Quem é você?</h2>
            <div class="login-tipo-grid">
                <div class="card-selecao" id="btn-aluno">
                    <span class="avatar">👦</span>
                    <span>Sou Aluno(a)</span>
                </div>
                <div class="card-selecao" id="btn-professor">
                    <span class="avatar">👨‍🏫</span>
                    <span>Sou Professor(a)</span>
                </div>
                <div class="card-selecao" id="btn-admin">
                    <span class="avatar">👑</span>
                    <span>Sou Diretor(a)</span>
                </div>
            </div>
        </div>

        <!-- Step Professor/Admin: Login -->
        <div id="step-prof-login" class="step-container" style="display: none;">
            <button id="btn-voltar-prof" class="btn-voltar">⬅️ Voltar</button>
            <h2 id="titulo-prof-login">Acesso do Professor</h2>
            <div class="form-group">
                <label for="prof-email">E-mail</label>
                <input type="email" id="prof-email" class="form-input" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="prof-senha">Senha</label>
                <input type="password" id="prof-senha" class="form-input" placeholder="********">
            </div>
            <div id="prof-erro" class="error-msg" style="display: none;"></div>
            <button id="btn-prof-entrar" class="btn-entrar">Entrar</button>
        </div>

        <!-- Step Admin: Painel -->
        <div id="step-admin-panel" class="step-container" style="display: none;">
            <button id="btn-admin-sair" class="btn-voltar">⬅️ Sair</button>
            <h2>Painel do Diretor 👑</h2>
            <div class="admin-section">
                <h3>Cadastrar Professor</h3>
                <div class="form-group">
                    <label for="novo-prof-nome">Nome</label>
                    <input type="text" id="novo-prof-nome" class="form-input" placeholder="Nome completo">
                </div>
                <div class="form-group">
                    <label for="novo-prof-email">E-mail</label>
                    <input type="email" id="novo-prof-email" class="form-input" placeholder="professor@caic.com.br">
                </div>
                <div class="form-group">
                    <label for="novo-prof-senha">Senha</label>
                    <input type="password" id="novo-prof-senha" class="form-input" placeholder="Mínimo 4 caracteres">
                </div>
                <div id="cadastro-prof-erro" class="error-msg" style="display: none;"></div>
                <div id="cadastro-prof-ok" class="error-msg" style="display: none; color: var(--success-color);"></div>
                <button id="btn-cadastrar-prof" class="btn-entrar">Cadastrar</button>
            </div>
            <hr>
            <h3>Professores Cadastrados</h3>
            <div id="lista-professores"></div>
        </div>

        <!-- Step 1: Selecionar Turma -->
        <div id="step-turma" class="step-container" style="display: none;">
            <button id="btn-voltar-tipo" class="btn-voltar">⬅️ Voltar</button>
            <h2>Qual é a sua turma?</h2>
            <div class="grid-turmas" id="turmas-list">
                <!-- Turmas renderizadas aqui -->
            </div>
            <button id="btn-visitante" class="btn-visitante">Entrar como visitante</button>
        </div>

        <!-- Step 2: Selecionar Aluno -->
        <div id="step-aluno" class="step-container" style="display: none;">
            <button id="btn-voltar-turma" class="btn-voltar">⬅️ Voltar</button>
            <h2 id="titulo-turma">Quem é você?</h2>
            <div class="grid-alunos" id="alunos-list">
                <!-- Alunos renderizados aqui -->
            </div>
        </div>

        <!-- Step 3: Senha -->
        <div id="step-senha" class="step-container" style="display: none;">
            <button id="btn-voltar-aluno" class="btn-voltar">⬅️ Voltar</button>
            <div class="senha-card">
                <span id="avatar-aluno-selecionado" class="avatar-grande">👦</span>
                <h2 id="titulo-senha">Olá!</h2>
                <p id="nome-aluno-selecionado"></p>
                <input type="password" id="input-senha" class="input-senha" placeholder="Digite sua senha" autocomplete="off">
                <div id="senha-erro" class="error-msg" style="display: none;"></div>
                <button id="btn-entrar" class="btn-entrar">Entrar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
